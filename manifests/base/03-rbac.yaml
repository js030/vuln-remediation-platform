apiVersion: v1
kind: ServiceAccount
metadata:
  name: ai-remediation-agent
  namespace: vuln-remediation
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: vulnerability-reader
rules:
- apiGroups: ["aquasecurity.github.io"]
  resources: ["vulnerabilityreports", "configauditreports"]
  verbs: ["get", "list", "watch"]
- apiGroups: ["apps"]
  resources: ["deployments"]
  verbs: ["get", "list"] # Erlaubt dem Agenten, die Struktur des betroffenen Deployments zu lesen
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: agent-vuln-reader-binding
subjects:
- kind: ServiceAccount
  name: ai-remediation-agent
  namespace: vuln-remediation
roleRef:
  kind: ClusterRole
  name: vulnerability-reader
  apiGroup: rbac.authorization.k8s.io