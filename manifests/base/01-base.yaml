apiVersion: v1
kind: Namespace
metadata:
  name: vuln-remediation
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: test-vuln-app
  namespace: vuln-remediation
spec:
  replicas: 1
  selector:
    matchLabels:
      app: test-vuln-app
  template:
    metadata:
      labels:
        app: test-vuln-app
    spec:
      containers:
      - name: nginx
        image: nginx:1.14.0