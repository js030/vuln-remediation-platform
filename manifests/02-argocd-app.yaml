apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: vulnerability-remediation-poc
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/js030/vuln-remediation-platform.git'
    targetRevision: main 
    path: manifests/base 
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: default 
  syncPolicy:
    automated:
      prune: true